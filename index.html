<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Mall Parking – Real-Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#1f2c38;color:white;text-align:center;}
h1{margin-top:20px;}
.dashboard{margin:20px;font-size:18px;}
.parking-area{margin:auto;width:95%;max-width:1200px;background:#2c3e50;padding:20px;border-radius:10px;}
.row{display:flex;justify-content:center;flex-wrap:wrap;}
.slot{width:65px;height:90px;margin:5px;border-radius:6px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;font-weight:bold;}
.free{background:#27ae60;}
.taken{background:#c0392b;}
.highlight{background:#f1c40f !important;color:black;}
button{margin:8px;padding:10px 20px;border:none;background:#f39c12;color:white;font-weight:bold;cursor:pointer;border-radius:5px;}
</style>
</head>

<body>

<h1>🏬 Smart Mall Parking – Real-Time</h1>

<div class="dashboard">
Total Slots: <span id="total"></span> |
Occupied: <span id="occupied"></span> |
Available: <span id="available"></span>
</div>

<div id="direction"></div>
<div class="parking-area" id="parkingArea"></div>

<br>
<button onclick="findNearest()">Find Nearest Slot</button>
<button onclick="exitSlot()">Exit</button>

<div id="fee"></div>

<script>
  // ===================
  // Firebase Config
  // ===================
  const firebaseConfig = {
    apiKey: "AIzaSyBEnNW9wNHhiJGEdkMX6f5EzojpkuCCjr4",
    authDomain: "smart-parking-e4bea.firebaseapp.com",
    databaseURL: "https://smart-parking-e4bea-default-rtdb.firebaseio.com",
    projectId: "smart-parking-e4bea",
    storageBucket: "smart-parking-e4bea.appspot.com",
    messagingSenderId: "24971869015",
    appId: "1:24971869015:web:df68fc4bf9cf36363a1c12",
    measurementId: "G-D6JJLENQHH"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ===================
  // Variables
  // ===================
  const totalSlots = 20; // adjust as needed
  let userId = Date.now(); // unique session ID
  let userSlot = null;

  // ===================
  // Initialize slots in DB (run once)
  // ===================
  function initSlots(){
    for(let i=1;i<=totalSlots;i++){
      const slotRef = db.ref('slots/P'+i);
      slotRef.once('value',snap=>{
        if(!snap.exists()){
          slotRef.set({ taken: false, user: null });
        }
      });
    }
  }

  // ===================
  // Render slots
  // ===================
  function renderSlots(snapshot){
    const area = document.getElementById('parkingArea');
    area.innerHTML = '';
    let occupied=0;

    snapshot.forEach(child=>{
      const slot = child.val();
      const div = document.createElement('div');
      div.className = 'slot ' + (slot.taken ? 'taken' : 'free');
      div.textContent = child.key;
      if(slot.taken && slot.user===userId) div.classList.add('highlight');

      div.onclick = () => reserveSlot(child.key);
      area.appendChild(div);

      if(slot.taken) occupied++;
    });

    document.getElementById('total').textContent = totalSlots;
    document.getElementById('occupied').textContent = occupied;
    document.getElementById('available').textContent = totalSlots - occupied;
  }

  // ===================
  // Reserve Slot
  // ===================
  function reserveSlot(slotId){
    const slotRef = db.ref('slots/'+slotId);

    slotRef.transaction(slot=>{
      if(slot){
        if(!slot.taken){
          slot.taken = true;
          slot.user = userId;
          userSlot = slotId;
          document.getElementById('direction').innerHTML = 'You reserved ' + slotId;
          return slot;
        } else if(slot.user===userId){
          alert('You already reserved this slot');
          return;
        } else {
          alert('Slot taken by another user');
          return;
        }
      }
    });
  }

  // ===================
  // Find Nearest Slot
  // ===================
  function findNearest(){
    const slotsRef = db.ref('slots');
    slotsRef.once('value',snapshot=>{
      snapshot.forEach(child=>{
        const slot = child.val();
        if(!slot.taken){
          reserveSlot(child.key);
          return true;
        }
      });
    });
  }

  // ===================
  // Exit Slot
  // ===================
  function exitSlot(){
    if(!userSlot){
      alert('You have no reserved slot');
      return;
    }
    db.ref('slots/'+userSlot).set({ taken:false, user:null });
    document.getElementById('direction').innerHTML = 'You exited slot ' + userSlot;
    userSlot = null;
  }

  // ===================
  // Real-Time Listener
  // ===================
  db.ref('slots').on('value',snapshot=>{
    renderSlots(snapshot);
  });

  // ===================
  // Initialize
  // ===================
  initSlots();
</script>
</body>
</html>
